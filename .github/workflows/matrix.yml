name: Matrix Demoo
on: push

jobs:
  build:
    continue-on-error: true # contunie execution even if some job failed
    strategy:
      matrix:
        node-version: [12, 20, 24]           # runs job 3 times with different Node versions
        operating-system: [ubuntu-latest, windows-latest]  # x2 OS = 6 total combinations
        include: #allows to add stand-alone combimation
            - node-version: 18
              operating-system: ubuntu-latest
        exclude:         #alows to exclude combination 
            - node-version: 12 
              operating-system: windows-latest
    
    runs-on: ${{ matrix.operating-system }}  # dynamically picks OS from matrix
    
    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Install Node JS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}  # dynamically picks Node version from matrix

      - name: Install Dependencies
        run: npm ci

      - name: Build project
        run: npm run build